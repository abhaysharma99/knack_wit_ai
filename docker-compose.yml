
services:
  redis:
    image: redis/redis-stack:7.4.0-v0
#    container_name: redis_broker
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
      - 8001:8001
    volumes:
      - redis-data:/data
    networks:
      - insights_network

  celery:
    build: .
#    container_name: celery_worker
    depends_on:
      - redis
      - postgres
    volumes:
      - ./data/uploads:/data/uploads
      - ./data/faiss:/data/faiss
      - hf_cache:/root/.cache/huggingface
    networks:
      - insights_network
    command: celery -A app.celery_worker worker --loglevel=${LOG_LEVEL}
    env_file:
      - .env

  fastapi:
    build: .
#    container_name: fastapi_app
    ports:
      - "${FASTAPI_PORT}:${FASTAPI_PORT}"
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app
      - ./data/uploads:/data/uploads
      - ./data/faiss:/data/faiss
      - hf_cache:/root/.cache/huggingface
    command: >
      uvicorn app.main:app --host ${FASTAPI_HOST} --port ${FASTAPI_PORT} --reload
    networks:
      - insights_network
    env_file:
      - .env
    develop:
      watch:
        - action: sync+restart
          path: ./app
          target: /app
  postgres:
    image: postgres:16.4
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB : fast_gpt_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - insights_network


networks:
  insights_network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
  hf_cache: